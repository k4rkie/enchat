<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchat | Welcome</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body class="welcome-page">
  <div class="container">
    <header class="hero">
      <h1>ENCHAT</h1>
      <p class="subtitle">Secure. Real-time. Ephemeral.</p>
    </header>

    <main class="actions">
      <section class="welcome-text">
        <p>Welcome to <b>Enchat</b>. Messages are never stored permanently. When the timer runs out, the conversation is
          gone
          forever.</p>
      </section>

      <div class="button-group">
        <button id="create-room-btn" class="primary-btn">CREATE NEW ROOM</button>

        <div class="join-section">
          <input type="text" id="join-input" placeholder="ENTER ROOM ID" maxlength="8" minlength="8">
          <p id="join-room-error" class="error-text hidden"></p>
          <button id="join-room-btn" class="secondary-btn">JOIN ROOM</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>By <a href="https://github.com/k4rkie" target="_blank" rel="noopener">k4rkie</a></p>
    </footer>

  </div>

  <!-- Room Configuration Modal -->
  <div id="room-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>INITIALIZE_ROOM</h2>

      <div class="modal-body">
        <div class="input-group">
          <label for="room-name">ROOM NAME:</label>
          <input type="text" id="room-name" placeholder="e.g. MISSION_CRITICAL" maxlength="20" autocomplete="off">
        </div>

        <div class="info-box">
          <p>> Default duration: 30 minutes</p>
          <p>> Encryption: Handshake-based</p>
        </div>
      </div>

      <div class="modal-actions">
        <button id="confirm-create" class="primary-btn">CREATE</button>
        <button id="cancel-modal" class="secondary-btn">CANCEL</button>
      </div>
    </div>
  </div>

  <script src="/index.js"></script>
</body>

</html>
