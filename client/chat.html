<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchat | Room</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.png">
</head>

<body class="chat-page">
  <div id="app">
    <header>
      <div class="header-top">
        <div class="brand">
          <h1>Enchat</h1>
          <div class="status-indicator">
            <span id="connection-status" class="status"></span>
            <span id="timer-display">--:--</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="terminate-room-btn" class="nuke-btn">TERMINATE_SESSION</button>
        </div>
      </div>

      <div class="header-bottom">
        <div class="room-meta">
          <div class="meta-item">
            <span class="label">ROOM:</span>
            <span id="room-name-display" class="value">INITIALIZING...</span>
          </div>
          <div class="meta-item">
            <span class="label">ID:</span>
            <code id="room-id-display" class="value">--------</code>
            <button id="copy-id-btn" class="icon-btn" title="Copy Room ID">⎘ </button>
          </div>
        </div>
        <div class="room-stats">
          <span id="user-count" class="value">1</span>
          <span class="label">USERS_ACTIVE</span>
        </div>
      </div>
    </header>

    <main id="chat-window">
      <div class="system-message">Connected to room. Messages are ephemeral.</div>
      <div id="messages-container">
      </div>
    </main>

    <footer>
      <form id="chat-form">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" required>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </footer>
  </div>

  <div id="expiry-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Room Expired</h2>
      <div class="modal-body">
        <p class="info-box">This room has reached its 30-minute limit and has been deleted. You will be redirected to
          the home page soon...</p>
      </div>
      <div class="modal-actions">
        <button id="confirm-expiry" class="primary-btn">Return Home</button>
      </div>
    </div>
  </div>



  <script src="/socket.io/socket.io.js"></script>
  <script src="/chat.js"></script>
</body>

</html>
