<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchat | Welcome</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="welcome-page">
  <div class="container">
    <header class="hero">
      <h1>ENCHAT</h1>
      <p class="subtitle">Secure. Real-time. Ephemeral.</p>
    </header>

    <main class="actions">
      <section class="welcome-text">
        <p>Welcome to Enchat. Messages are never stored permanently. When the timer runs out, the conversation is gone
          forever.</p>
      </section>

      <div class="button-group">
        <a href="/chat" id="create-room-btn" class="primary-btn">CREATE NEW ROOM</a>

        <div class="join-section">
          <input type="text" id="join-input" placeholder="ENTER ROOM ID" maxlength="10">
          <button id="join-room-btn" class="secondary-btn">JOIN ROOM</button>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
