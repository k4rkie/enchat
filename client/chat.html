<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchat | Room</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body class="chat-page">
  <div id="app">
    <header>
      <div class="header-content">
        <h1>Enchat</h1>
        <div class="status-indicator">
          <span id="connection-status" class="status"></span>
          <span id="timer-display">00:00</span>
        </div>
      </div>
    </header>

    <main id="chat-window">
      <div class="system-message">Connected to room. Messages are ephemeral.</div>
      <div id="messages-container">
      </div>
    </main>

    <footer>
      <form id="chat-form">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" required>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </footer>
  </div>

  <div id="expiry-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Room Expired</h2>
      <div class="modal-body">
        <p class="info-box">This room has reached its 30-minute limit and has been deleted. You will be redirected to
          the home page soon...</p>
      </div>
      <div class="modal-actions">
        <button id="confirm-expiry" class="primary-btn">Return Home</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/chat.js"></script>
</body>

</html>
